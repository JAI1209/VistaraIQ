name: VistaraIQ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-suite/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: auth-suite/backend/package-lock.json
      - name: Install backend deps
        run: npm install
      - name: Backend syntax check
        run: node -e "require('./models/user'); require('./middleware/authMiddleware'); require('./routes/auth'); console.log('backend modules loaded')"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-suite/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: auth-suite/frontend/package-lock.json
      - name: Install frontend deps
        run: npm install
      - name: Build frontend
        run: npm run build
